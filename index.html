<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formulaire d'inscription - Newsletter</title>
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Container principal */
        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            transition: all 0.3s ease;
        }

        /* Titre */
        .form-container h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
        }

        .form-container .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Champs du formulaire */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        label .required {
            color: #e74c3c;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error {
            border-color: #e74c3c;
            background-color: #fff5f5;
        }

        input.success {
            border-color: #27ae60;
            background-color: #f0fff4;
        }

        /* Message d'erreur sous le champ */
        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        /* Bouton */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* Messages de statut (succès/erreur généraux) */
        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* Checkbox RGPD */
        .checkbox-group {
            margin: 20px 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-top: 2px;
            transform: scale(1.1);
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            font-size: 13px;
            color: #555;
            line-height: 1.4;
            cursor: pointer;
        }

        .checkbox-group a {
            color: #667eea;
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .checkbox-group.error-checkbox label {
            color: #e74c3c;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-container {
                padding: 25px;
            }
            
            .form-container h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>✨ Rejoignez notre newsletter</h1>
        <p class="subtitle">Recevez nos actualités, offres exclusives et bons plans</p>

        <form id="brevoForm" method="POST">
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                <div class="error-message" id="emailError">Veuillez saisir un email valide</div>
            </div>

            <div class="form-group">
                <label>Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom">
                <div class="error-message" id="prenomError"></div>
            </div>

            <div class="form-group">
                <label>Téléphone mobile</label>
                <input type="tel" id="telephone" name="telephone" placeholder="06 12 34 56 78">
                <div class="error-message" id="telephoneError">Format de téléphone invalide (ex: 0612345678 ou +33612345678)</div>
            </div>

            <div class="checkbox-group" id="checkboxGroup">
                <input type="checkbox" id="rgpd" name="rgpd" required>
                <label for="rgpd">
                    J'accepte de recevoir des communications de la part de [TON ENTREPRISE]. 
                    Je peux me désinscrire à tout moment via le lien présent dans chaque email. 
                    <a href="#" target="_blank">En savoir plus sur la gestion de mes données</a>.
                </label>
            </div>

            <button type="submit" id="submitBtn">S'inscrire à la newsletter</button>
        </form>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - À MODIFIER AVEC TES INFOS
        // ============================================
        
        // 🔑 TA CLÉ API BREVO (OBLIGATOIRE)
        // À récupérer dans Brevo : Paramètres > SMTP & API > Clés API
        const BREVO_API_KEY = '';
        // 🌐 URL DE TON PROXY GOOGLE APPS SCRIPT
        const PROXY_URL = 'https://script.google.com/macros/s/AKfycby6CGAVc56kUBA87kqu6eO2QDbqEQO4573GCVqIl_6ZQ0O_9in-_IDskjBLUTabne31gQ/exec';
        // 📋 ID DE TA LISTE BREVO (OPTIONNEL - mettre null si pas besoin)
        // À récupérer dans Brevo : Listes de contacts > ID de la liste
        const BREVO_LIST_ID = null; // Exemple : 8
        
        // 🌐 URL de redirection après succès (OPTIONNEL - mettre null pour rester sur la page)
        const REDIRECT_URL = null; // Exemple : 'https://tonsite.com/merci'
        
        // ============================================
        // FIN DE LA CONFIGURATION
        // ============================================
        
        // Sélection des éléments DOM
        const form = document.getElementById('brevoForm');
        const emailInput = document.getElementById('email');
        const prenomInput = document.getElementById('prenom');
        const telephoneInput = document.getElementById('telephone');
        const rgpdCheckbox = document.getElementById('rgpd');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('statusMessage');
        const checkboxGroup = document.getElementById('checkboxGroup');

        // Regex validations
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        const phoneRegex = /^(\+33|0)[1-9](\d{2}){4}$|^(\+33|0)[67](\d{2}){4}$/;

        // Afficher un message temporaire
        function showMessage(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status-message ${type}`;
            
            // Auto-masquer après 5 secondes pour les succès
            if(type === 'success') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                    statusDiv.className = 'status-message';
                }, 5000);
            }
        }

        // Validation du formulaire
        function validateForm() {
            let isValid = true;
            
            // Validation email (obligatoire)
            if (!emailInput.value.trim() || !emailRegex.test(emailInput.value.trim())) {
                emailInput.classList.add('error');
                document.getElementById('emailError').style.display = 'block';
                isValid = false;
            } else {
                emailInput.classList.remove('error');
                emailInput.classList.add('success');
                document.getElementById('emailError').style.display = 'none';
            }
            
            // Validation téléphone (optionnelle mais formatée)
            if (telephoneInput.value.trim() && !phoneRegex.test(telephoneInput.value.trim())) {
                telephoneInput.classList.add('error');
                document.getElementById('telephoneError').style.display = 'block';
                isValid = false;
            } else {
                telephoneInput.classList.remove('error');
                telephoneInput.classList.add('success');
                document.getElementById('telephoneError').style.display = 'none';
            }
            
            // Prénom (juste une vérification basique)
            if (prenomInput.value.trim().length > 50) {
                prenomInput.classList.add('error');
                document.getElementById('prenomError').textContent = 'Prénom trop long (max 50 caractères)';
                document.getElementById('prenomError').style.display = 'block';
                isValid = false;
            } else if (prenomInput.value.trim().length > 0 && prenomInput.value.trim().length < 2) {
                prenomInput.classList.add('error');
                document.getElementById('prenomError').textContent = 'Prénom trop court';
                document.getElementById('prenomError').style.display = 'block';
                isValid = false;
            } else {
                prenomInput.classList.remove('error');
                if (prenomInput.value.trim()) {
                    prenomInput.classList.add('success');
                }
                document.getElementById('prenomError').style.display = 'none';
            }
            
            // Validation RGPD (obligatoire)
            if (!rgpdCheckbox.checked) {
                checkboxGroup.classList.add('error-checkbox');
                isValid = false;
            } else {
                checkboxGroup.classList.remove('error-checkbox');
            }
            
            return isValid;
        }

        // Nettoyer le numéro de téléphone
        function cleanPhoneNumber(phone) {
            if (!phone) return '';
            // Supprime tous les espaces, tirets, points et parenthèses
            let cleaned = phone.replace(/[\s\-\.\(\)]/g, '');
            // Si le numéro commence par 0 et fait 10 chiffres, on le transforme en format international
            if (cleaned.startsWith('0') && cleaned.length === 10) {
                cleaned = '+33' + cleaned.substring(1);
            }
            return cleaned;
        }

        // Envoi vers Brevo
        // Envoi vers Brevo via le proxy (et non directement)
        async function sendToBrevo(email, prenom, telephone) {
            const cleanPhone = cleanPhoneNumber(telephone);
            
            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        prenom: prenom,
                        telephone: cleanPhone,
                        listId: BREVO_LIST_ID
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    return { success: true, message: '✅ Inscription réussie ! Bienvenue parmi nous 🎉' };
                } else {
                    return { success: false, message: '❌ Erreur lors de l\'inscription: ' + (result.message || '') };
                }
            } 
            catch (error) {
                console.error('Erreur:', error);
                return { success: false, message: '❌ Erreur de connexion. Réessayez.' };
            }
        }
        // Gestion de la soumission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Cacher message précédent
            statusDiv.style.display = 'none';
            
            // Valider
            if (!validateForm()) {
                showMessage('⚠️ Veuillez corriger les erreurs du formulaire', 'error');
                // Scroll vers le premier champ en erreur
                const firstError = document.querySelector('.error');
                if (firstError) {
                    firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }
            
            // Désactiver bouton pendant l'envoi
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Envoi en cours...';
            
            // Récupérer les valeurs
            const email = emailInput.value.trim();
            const prenom = prenomInput.value.trim();
            const telephone = telephoneInput.value.trim();
            
            // Envoyer à Brevo
            const result = await sendToBrevo(email, prenom, telephone);
            
            // Réactiver bouton
            submitBtn.disabled = false;
            submitBtn.textContent = "S'inscrire à la newsletter";
            
            if (result.success) {
                showMessage(result.message, 'success');
                
                // Vider le formulaire
                form.reset();
                
                // Retirer les classes success
                emailInput.classList.remove('success');
                prenomInput.classList.remove('success');
                telephoneInput.classList.remove('success');
                rgpdCheckbox.checked = false;
                
                // Redirection si configurée
                if (REDIRECT_URL) {
                    setTimeout(() => {
                        window.location.href = REDIRECT_URL;
                    }, 2000);
                }
            } else {
                showMessage(result.message, 'error');
            }
        });
        
        // Validation en temps réel (améliore l'UX)
        emailInput.addEventListener('input', () => {
            if (emailInput.value.trim() && emailRegex.test(emailInput.value.trim())) {
                emailInput.classList.remove('error');
                emailInput.classList.add('success');
                document.getElementById('emailError').style.display = 'none';
            } else {
                emailInput.classList.remove('success');
            }
        });
        
        telephoneInput.addEventListener('input', () => {
            if (!telephoneInput.value.trim()) {
                telephoneInput.classList.remove('error', 'success');
                document.getElementById('telephoneError').style.display = 'none';
            } else if (phoneRegex.test(telephoneInput.value.trim())) {
                telephoneInput.classList.remove('error');
                telephoneInput.classList.add('success');
                document.getElementById('telephoneError').style.display = 'none';
            } else {
                telephoneInput.classList.remove('success');
            }
        });
        
        prenomInput.addEventListener('input', () => {
            if (prenomInput.value.trim() && prenomInput.value.trim().length >= 2 && prenomInput.value.trim().length <= 50) {
                prenomInput.classList.remove('error');
                prenomInput.classList.add('success');
                document.getElementById('prenomError').style.display = 'none';
            } else if (!prenomInput.value.trim()) {
                prenomInput.classList.remove('error', 'success');
            } else {
                prenomInput.classList.remove('success');
            }
        });
        
        rgpdCheckbox.addEventListener('change', () => {
            if (rgpdCheckbox.checked) {
                checkboxGroup.classList.remove('error-checkbox');
            }
        });
    </script>
</body>
</html>
